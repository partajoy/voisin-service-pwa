<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voisin Service - Services entre voisins Anderlecht</title>
    
    <!-- Google Fonts Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Firebase CDN -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    
    <!-- Meta PWA -->
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Voisin Service">
</head>
<body>
    <!-- Auth Section -->
    <div id="auth-section" class="fade-in">
        <div class="auth-header">
            <h2>🌐 Voisin Service</h2>
            <p>Services entre voisins à Anderlecht</p>
        </div>
        
        <form id="auth-form" class="auth-form">
            <input type="email" id="email" placeholder="📧 Votre email" required>
            <input type="password" id="password" placeholder="🔒 Mot de passe" required>
            <div class="auth-buttons">
                <button type="button" id="signup" class="btn-primary">✅ S'inscrire</button>
                <button type="button" id="login" class="btn-secondary">🔑 Se connecter</button>
            </div>
            <p id="auth-message"></p>
        </form>
    </div>

    <!-- App Section -->
    <div id="app-section" style="display:none;">
        <!-- Header avec onglets -->
        <header class="app-header">
            <h1>🏠 Services Voisins</h1>
            <div class="header-tabs">
                <button class="tab-btn active" onclick="showTab('all')">📋 Toutes</button>
                <button class="tab-btn" onclick="showTab('mine')">🟢 Mes annonces</button>
                <button class="tab-btn" onclick="showTab('messages')">💬 Messages (<span id="msg-count">0</span>)</button>
            </div>
            <button id="logout" class="btn-danger">🚪</button>
        </header>

        <!-- Publier Annonce -->
        <section class="create-section slide-up">
            <h3>📤 Publier une annonce</h3>
            <form id="annonce-form">
                <select id="categorie" required>
                    <option value="" disabled selected>Choisir une catégorie</option>
                    <option value="lave-linge">🧺 Machine à laver disponible</option>
                    <option value="covoiturage">🚗 Proposer/Demander covoiturage</option>
                    <option value="plat-du-jour">🍲 Plat du jour à partager</option>
                </select>
                <input type="text" id="titre" placeholder="Titre (ex: Machine à laver gratuite ce soir)" required>
                <textarea id="description" placeholder="Détails... (horaires, adresse approx, conditions)" required></textarea>
                <button type="submit" class="btn-success-large">📤 Publier</button>
            </form>
        </section>

        <!-- Toutes les Annonces -->
        <section id="all-tab" class="tab-content active">
            <h3>📋 Toutes les annonces</h3>
            <div id="annonces-list"></div>
        </section>

        <!-- Mes Annonces -->
        <section id="mine-tab" class="tab-content">
            <h3>🟢 Mes annonces</h3>
            <div id="mine-list"></div>
        </section>

        <!-- Mes Messages -->
        <section id="messages-tab" class="tab-content">
            <h3>💬 Mes messages reçus</h3>
            <div id="messages-list"></div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
